name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Spins up a throwaway Frappe bench (matching local: develop / Python 3.14),
    # installs the app, builds the Vue frontend, and runs the headless engine
    # smoke test. The frontend is built inside the bench on purpose — socket.js
    # reads the socket.io port from sites/common_site_config.json (frappe-ui
    # convention), so it only resolves within a bench layout.
    name: Build + engine smoke test
    runs-on: ubuntu-22.04
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: last_square_standing

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install bench
        run: pip install frappe-bench

      - name: Init bench (Frappe develop)
        run: |
          bench init --skip-redis-config-generation --skip-assets \
            --python "$(which python)" --frappe-branch develop ~/frappe-bench

      - name: Point bench at CI services
        working-directory: /home/runner/frappe-bench
        run: |
          bench set-config -g db_host 127.0.0.1
          bench set-config -g db_port 3306
          bench set-config -g redis_cache "redis://localhost:6379"
          bench set-config -g redis_queue "redis://localhost:6379"
          bench set-config -g redis_socketio "redis://localhost:6379"
          bench set-config -g developer_mode 1

      - name: Get app
        working-directory: /home/runner/frappe-bench
        run: bench get-app last_square_standing "${{ github.workspace }}/last_square_standing"

      - name: Build frontend
        # Inside the bench, so ../../../../sites/common_site_config.json resolves.
        working-directory: /home/runner/frappe-bench/apps/last_square_standing/frontend
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Create site + install app
        working-directory: /home/runner/frappe-bench
        run: |
          bench new-site test.localhost \
            --mariadb-root-password root \
            --db-root-username root \
            --admin-password admin \
            --no-mariadb-socket
          bench --site test.localhost install-app last_square_standing
          bench --site test.localhost migrate

      - name: Run engine smoke test
        working-directory: /home/runner/frappe-bench
        run: bench --site test.localhost execute last_square_standing.sim.run
